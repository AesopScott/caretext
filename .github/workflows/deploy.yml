name: Deploy Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare CI Wrangler config
        run: |
          node -e "const fs = require('fs'); const config = JSON.parse(fs.readFileSync('wrangler.jsonc', 'utf8')); delete config.routes; fs.writeFileSync('wrangler.ci.json', JSON.stringify(config, null, 2));"

      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.ci.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
